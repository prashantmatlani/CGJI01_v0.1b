
<!DOCTYPE html>
<html>
<head>
    <title>CGJI01 — Jungian Intelligence</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <h1>CGJI01 — Multi-Agent Jungian Intelligence</h1>

    <!-- 🔹 CHAT DISPLAY -->
    <div id="chat"
         style="height:400px; overflow-y:auto; border:1px solid #ccc; padding:10px; margin-top:10px;">
    </div>

    <!-- 🔹 SINGLE INPUT (REPLACES BOTH BOXES) -->
    <p id="input_label">Enter query:</p>

    <textarea id="main_input"
              placeholder="Let's talk"
              style="width:100%; height:80px;"></textarea>

    <!-- 🔹 FIRE BUTTON (STARTS CONVERSATION) -->
    <button id="fire_btn" onclick="fire()">Fire</button>

    <!-- 🔹 END SESSION (HIDDEN INITIALLY) -->
    <button id="end_btn"
            onclick="endSession()"
            style="display:none;">
        End Session
    </button>

    <hr>

    <!-- 🔹 AGENT GRID -->
    <div class="grid">

        <div class="agent"><h2>Agent Jung</h2><pre id="jung"></pre></div>
        <div class="agent"><h2>Agent Dream</h2><pre id="dream"></pre></div>
        <div class="agent"><h2>Agent Shadow</h2><pre id="shadow"></pre></div>
        <div class="agent"><h2>Agent Myth</h2><pre id="myth"></pre></div>
        <div class="agent"><h2>Agent Epistemic</h2><pre id="epistemic"></pre></div>
        <div class="agent"><h2>Agent BPsy</h2><pre id="bpsy"></pre></div>
        <div class="agent"><h2>Agent JRed</h2><pre id="jred"></pre></div>
        <div class="agent"><h2>Agent Synthesis</h2><pre id="synthesis"></pre></div>

        <div class="agent final">
            <h2>Final Output</h2>
<pre id="final"></pre>
        </div>

    </div>

    <script src="/static/app.js"></script>

</body>
</html>
