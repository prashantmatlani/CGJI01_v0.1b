<!DOCTYPE html>
<html>
<head>
<title>CGJI01 — Jungian Intelligence</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>CGJI01 — Multi-Agent Jungian Intelligence</h1>

<!-- 🔹 INITIAL QUERY -->
<textarea id="initial_input" placeholder="Enter your main query..."></textarea>

<button onclick="runAnalysis()">Run Analysis</button>
<button onclick="endSession()">End Session</button>

<!-- 🔹 CHAT / FOLLOW-UP DISPLAY -->
<div id="chat" style="height:400px; overflow-y:auto; border:1px solid #ccc; padding:10px;"></div>


<!-- 🔹 LABEL ABOVE FOLLOW-UP INPUT -->
<p>Respond to the system:</p>
<!-- 🔹 FOLLOW-UP INPUT -->
<textarea id="followup_input" placeholder="Type your response..."></textarea>

<button onclick="sendFollowup()">Send</button>

<hr>

<!-- 🔹 AGENT GRID -->
<div class="grid">

<div class="agent"><h2>Jung</h2><pre id="jung"></pre></div>
<div class="agent"><h2>Dream</h2><pre id="dream"></pre></div>
<div class="agent"><h2>Shadow</h2><pre id="shadow"></pre></div>
<div class="agent"><h2>Myth</h2><pre id="myth"></pre></div>
<div class="agent"><h2>Epistemic</h2><pre id="epistemic"></pre></div>
<div class="agent"><h2>BPsy</h2><pre id="bpsy"></pre></div>
<div class="agent"><h2>JRed</h2><pre id="jred"></pre></div>
<div class="agent"><h2>Synthesis</h2><pre id="synthesis"></pre></div>

<div class="agent final">
<h2>Final Output</h2>
<pre id="final"></pre>
</div>

</div>

<script src="/static/app.js"></script>



</body>
</html>
